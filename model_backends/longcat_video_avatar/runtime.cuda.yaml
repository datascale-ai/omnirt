name: longcat_video_avatar
device: cuda
profile: cuda

sources:
  repo_url: https://github.com/meituan-longcat/LongCat-Video.git
  checkpoint_url:
  wav2vec_repo_id:

paths:
  runtime_dir: ${OMNIRT_HOME}/runtimes/longcat_video_avatar/cuda
  repo_dir: ${OMNIRT_HOME}/model-repos/LongCat-Video

runtime:
  type: venv
  python: "3.10"
  nproc_per_node: 8

install:
  requirements_file: ${OMNIRT_ROOT}/model_backends/longcat_video_avatar/requirements-gpu.txt
  pip_index_url: https://download.pytorch.org/whl/cu128
  pip_extra_index_url: https://pypi.org/simple
  hf_endpoint: https://huggingface.co

launch:
  server_path: ${OMNIRT_ROOT}/model_backends/longcat_video_avatar/run_avatar_worker_cuda.sh

defaults:
  ckpt_dir: weights/LongCat-Video-Avatar-1.5
  wav2vec_dir:
