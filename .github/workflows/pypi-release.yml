name: PyPI Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string
      artifact_source:
        description: "Where to get the package artifacts from"
        required: true
        default: release-assets
        type: choice
        options:
          - release-assets
          - build-from-tag

permissions:
  contents: read

concurrency:
  group: pypi-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Prepare Python artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check release tag format
        run: |
          case "${{ inputs.tag }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release tag must look like v0.1.0"
              exit 1
              ;;
          esac

      - name: Check out release tag
        if: ${{ inputs.artifact_source == 'build-from-tag' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package tooling
        run: python -m pip install -U pip build twine

      - name: Download release artifacts
        if: ${{ inputs.artifact_source == 'release-assets' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p dist
          gh release download "${{ inputs.tag }}" \
            --pattern "omnirt-*.whl" \
            --pattern "omnirt-*.tar.gz" \
            --dir dist

      - name: Build package artifacts
        if: ${{ inputs.artifact_source == 'build-from-tag' }}
        run: python -m build

      - name: Check package artifact metadata
        run: |
          python - <<'PY'
          import tarfile
          import tomllib
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          wheels = sorted(dist.glob("omnirt-*.whl"))
          sdists = sorted(dist.glob("omnirt-*.tar.gz"))
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit("Release must contain exactly one omnirt wheel and one sdist.")

          tag = "${{ inputs.tag }}"
          expected_version = tag.removeprefix("v")

          with zipfile.ZipFile(wheels[0]) as archive:
              metadata_name = next(
                  name for name in archive.namelist()
                  if name.endswith(".dist-info/METADATA")
              )
              metadata = archive.read(metadata_name).decode()
              wheel_tests = [
                  name for name in archive.namelist()
                  if name.startswith("tests/")
              ]

          wheel_fields = {}
          for line in metadata.splitlines():
              if ": " in line:
                  key, value = line.split(": ", 1)
                  wheel_fields.setdefault(key, value)

          with tarfile.open(sdists[0]) as archive:
              pyproject_name = next(
                  name for name in archive.getnames()
                  if name.endswith("/pyproject.toml")
              )
              pyproject_file = archive.extractfile(pyproject_name)
              if pyproject_file is None:
                  raise SystemExit("sdist is missing pyproject.toml")
              pyproject = tomllib.loads(pyproject_file.read().decode())
              sdist_tests = [
                  name for name in archive.getnames()
                  if "/tests/" in name
              ]

          if wheel_fields.get("Name") != "omnirt":
              raise SystemExit("Wheel package name must be omnirt.")
          if pyproject["project"]["name"] != "omnirt":
              raise SystemExit("sdist package name must be omnirt.")
          if wheel_fields.get("Version") != expected_version:
              raise SystemExit(
                  f"Wheel version {wheel_fields.get('Version')} does not match {tag}."
              )
          if pyproject["project"]["version"] != expected_version:
              raise SystemExit(
                  f"sdist version {pyproject['project']['version']} does not match {tag}."
              )
          if wheel_tests or sdist_tests:
              raise SystemExit(
                  "Release artifacts must not include top-level tests files."
              )
          PY

      - name: Check package artifacts
        run: python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnirt-python-dist-${{ inputs.tag }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/omnirt/
    permissions:
      id-token: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: omnirt-python-dist-${{ inputs.tag }}
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
